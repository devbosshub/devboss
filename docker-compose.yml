services:
  postgres:
    image: postgres:16-alpine
    container_name: devboss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devboss}
      POSTGRES_USER: ${POSTGRES_USER:-devboss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devboss}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devboss} -d ${POSTGRES_DB:-devboss}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: devboss-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://devboss:devboss@postgres:5432/devboss}
      UPLOAD_DIR: /app/uploads
      RUNTIME_DOCKER_NETWORK: ${RUNTIME_DOCKER_NETWORK:-devboss_default}
      RUNTIME_API_BASE_URL: ${RUNTIME_API_BASE_URL:-http://backend:8000}
      RUNTIME_IMAGE_CONTEXT_PATH: /workspace/runtime
    volumes:
      - ./backend:/app
      - .:/workspace
      - backend-uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
    container_name: devboss-frontend
    restart: unless-stopped
    command: sh -c "npm install && npm run dev"
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
  backend-uploads:
